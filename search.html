<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />

<title>Search Diagrams</title>

<style>
*{ box-sizing:border-box; }

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#efefef;
  font-family:Arial, Helvetica, sans-serif;
  color:#111;
}

.top-bar{
  width:100%;
  height:104px;
  padding:24px 28px;
  background:#efefef;
  border-bottom:1px solid #d8d8d8;
}

.search-input{
  width:100%;
  height:56px;
  border:none;
  outline:none;
  background:#fff;
  padding:0 20px;
  font-size:18px;
  font-family:Arial, Helvetica, sans-serif;
  border-radius:0px;
  box-shadow:0 0 0 1px #d9d9d9 inset;
}

.search-input::placeholder{ color:#999; }

.grid{
  width:100vw;
  height:calc(100vh - 104px);
  padding:28px;
  display:grid;
  grid-template-columns:repeat(8, 1fr);
  grid-template-rows:repeat(5, 1fr);
  gap:18px;
  overflow:hidden;
}

.card{
  width:100%;
  height:100%;
  min-width:0;
  min-height:0;
  display:grid;
  grid-template-rows:1fr 32px;
  cursor:pointer;
}

.thumb{
  width:100%;
  height:100%;
  min-width:0;
  min-height:0;
  background:#fff;
  border-radius:0px;
  overflow:hidden;
  border:1px solid #ddd;
  box-shadow:none;
}

.thumb img{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
  display:block;
  box-sizing:border-box;
}

.source{
  width:100%;
  height:32px;
  padding-top:7px;
  text-align:center;
  font-size:10.5px;
  line-height:1.15;
  color:#777;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  word-break:break-word;
}

/* 크게 뜨는 화면 */
.overlay{
  position:fixed;
  inset:0;
  z-index:999;
  background:rgba(239,239,239,.94);
  display:none;
  align-items:center;
  justify-content:center;
  padding:48px;
}

.overlay.active{
  display:flex;
}

.result-box{
  max-width:82vw;
  max-height:82vh;
  text-align:center;
}

.result-box img{
  max-width:82vw;
  max-height:72vh;
  object-fit:contain;
  display:block;
  margin:0 auto;
  background:#fff;
  box-shadow:0 0 0 1px #ddd;
}

.result-source{
  margin-top:14px;
  font-size:13px;
  line-height:1.4;
  color:#777;
}

.close-btn{
  position:fixed;
  top:24px;
  right:28px;
  border:1px solid #ccc;
  background:#fff;
  font-size:14px;
  padding:8px 12px;
  border-radius:999px;
  cursor:pointer;
}

.no-result{
  font-size:18px;
  color:#777;
}
</style>
</head>

<body>

<header class="top-bar">
  <input
    class="search-input"
    id="searchInput"
    type="text"
    placeholder="Search diagrams by keyword..."
  />
</header>

<section class="grid" id="grid"></section>

<div class="overlay" id="overlay">
  <button class="close-btn" id="closeBtn">close</button>
  <div class="result-box" id="resultBox"></div>
</div>

const grid = document.getElementById("grid");
const searchInput = document.getElementById("searchInput");
const overlay = document.getElementById("overlay");
const resultBox = document.getElementById("resultBox");
const closeBtn = document.getElementById("closeBtn");

diagrams.forEach((item, index) => {
  const card = document.createElement("article");
  card.className = "card";

  card.innerHTML = `
    <div class="thumb">
      <img src="${item.image}" alt="">
    </div>
    <div class="source">${item.source}</div>
  `;

  card.addEventListener("click", () => {
    showDiagram(item);
  });

  grid.appendChild(card);
});

function normalize(text){
  return text.toLowerCase().trim();
}

function findBestMatch(query){
  const q = normalize(query);
  if(!q) return null;

  let best = null;
  let bestScore = 0;

  diagrams.forEach(item => {
    let score = 0;

    item.keywords.forEach(keyword => {
      const k = normalize(keyword);

      if(k === q) score += 5;
      else if(k.includes(q)) score += 3;
      else if(q.includes(k)) score += 2;
    });

    if(score > bestScore){
      bestScore = score;
      best = item;
    }
  });

  return best;
}

function showDiagram(item){
  resultBox.innerHTML = `
    <img src="${item.image}" alt="">
    <div class="result-source">${item.source}</div>
  `;

  overlay.classList.add("active");
}

function showNoResult(){
  resultBox.innerHTML = `
    <div class="no-result">
      No matching diagram found.
    </div>
  `;

  overlay.classList.add("active");
}

searchInput.addEventListener("keydown", event => {
  if(event.key === "Enter"){
    const query = searchInput.value;
    const result = findBestMatch(query);

    if(result){
      showDiagram(result);
    }else{
      showNoResult();
    }
  }
});

closeBtn.addEventListener("click", () => {
  overlay.classList.remove("active");
});

overlay.addEventListener("click", event => {
  if(event.target === overlay){
    overlay.classList.remove("active");
  }
});

document.addEventListener("keydown", event => {
  if(event.key === "Escape"){
    overlay.classList.remove("active");
  }
});
</script>
