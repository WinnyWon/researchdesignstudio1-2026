<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Draw Diagram</title>

<style>
*{ box-sizing:border-box; }

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#fff;
  font-family:Arial, Helvetica, sans-serif;
  color:#111;
  cursor:crosshair;
}

.draw-stage{
  position:relative;
  width:100vw;
  height:100vh;
  background:#fff;
  overflow:hidden;
}

#drawCanvas{
  position:absolute;
  left:0;
  top:0;
  width:calc(100vw - 360px);
  height:100vh;
  z-index:1;
}

.word-layer{
  position:absolute;
  left:0;
  top:0;
  width:calc(100vw - 360px);
  height:100vh;
  z-index:2;
  pointer-events:none;
}

.floating-word{
  position:absolute;
  font-size:28px;
  font-weight:700;
  line-height:1;
  color:#111;
  white-space:nowrap;
  user-select:none;
}

/* 오른쪽 패널 */
.side-panel{
  position:absolute;
  top:0;
  right:0;
  width:360px;
  height:100vh;
  z-index:5;

  display:grid;
  grid-template-columns:130px 1fr;

  background:#fff;
}

.shape-info{
  background:#d8d8d8;
  padding:26px 20px;

  font-size:17px;
  line-height:1.35;
  font-weight:800;
  text-align:center;
}

.shape-info ul{
  list-style:none;
  margin:18px 0 0;
  padding:0;

  font-size:16px;
  line-height:1.35;
  font-weight:700;
}

.source-info{
  padding:26px 18px;

  font-size:20px;
  line-height:1.12;
  font-weight:700;

  overflow:hidden;
}

/* 왼쪽 위 회색 원 */
.dot{
  position:absolute;
  top:42px;
  left:46px;
  width:42px;
  height:42px;
  z-index:6;
  border-radius:50%;
  background:#d8d8d8;
}

/* 버튼은 유지 */
.back-btn{
  position:absolute;
  left:24px;
  bottom:96px;
  z-index:6;

  font-size:12px;
  text-decoration:none;
  color:#111;
  border:1px solid #d4d4d4;
  background:#fff;
  padding:8px 10px;
  cursor:pointer;
}

.clear-btn{
  position:absolute;
  left:24px;
  bottom:58px;
  z-index:6;

  font-size:12px;
  border:1px solid #d4d4d4;
  background:#fff;
  padding:8px 10px;
  cursor:pointer;
}

.guide{
  position:absolute;
  left:24px;
  bottom:20px;
  z-index:6;

  font-size:12px;
  color:#777;
  background:#fff;
  border:1px solid #d4d4d4;
  padding:8px 10px;
}
</style>
</head>

<body>

<div class="draw-stage">

  <canvas id="drawCanvas"></canvas>

  <div class="word-layer" id="wordLayer"></div>

  <div class="dot"></div>

  <aside class="side-panel">
    <div class="shape-info">
      쓰인 도형
      <ul>
        <li>직선</li>
        <li>화살표</li>
        <li>사각형</li>
        <li>순환구조</li>
      </ul>
    </div>

    <div class="source-info" id="sourceInfo">
      Draw your own diagram from the selected words.
    </div>
  </aside>

  <a class="back-btn" href="index.html">back</a>
  <button class="clear-btn" id="clearBtn">clear drawing</button>
  <div class="guide">click + drag to draw lines</div>

</div>

<script>
const canvas = document.getElementById("drawCanvas");
const ctx = canvas.getContext("2d");
const wordLayer = document.getElementById("wordLayer");
const clearBtn = document.getElementById("clearBtn");
const sourceInfo = document.getElementById("sourceInfo");

let drawing = false;
let lastX = 0;
let lastY = 0;

function resizeCanvas(){
  const ratio = window.devicePixelRatio || 1;

  canvas.width = window.innerWidth * ratio;
  canvas.height = window.innerHeight * ratio;

  canvas.style.width = window.innerWidth + "px";
  canvas.style.height = window.innerHeight + "px";

  ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = "#111";
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

function getSelectedText(){
  const params = new URLSearchParams(window.location.search);
  return params.get("q") || "";
}

function cleanWords(text){
  return text
    .replace(/[.,:;()“”"!?—–]/g, " ")
    .split(/\s+/)
    .map(word => word.trim())
    .filter(word => word.length > 1)
    .slice(0, 28);
}

function placeWords(){
  const selectedText = getSelectedText();
  const words = cleanWords(selectedText);

  sourceInfo.textContent =
    selectedText.length > 0
      ? selectedText
      : "Draw your own diagram from the selected words.";

  if(words.length === 0){
    wordLayer.innerHTML = `
      <div class="floating-word" style="left:45vw; top:42vh;">draw</div>
      <div class="floating-word" style="left:32vw; top:55vh;">connect</div>
      <div class="floating-word" style="left:58vw; top:58vh;">reflect</div>
    `;
    return;
  }

  const usableWidth = window.innerWidth - 310;
  const usableHeight = window.innerHeight - 120;

  wordLayer.innerHTML = "";

  words.forEach((word, index) => {
    const el = document.createElement("div");
    el.className = "floating-word";
    el.textContent = word;

    const angle = (index / words.length) * Math.PI * 2;
    const radiusX = usableWidth * (0.18 + (index % 4) * 0.04);
    const radiusY = usableHeight * (0.12 + (index % 5) * 0.025);

    const centerX = usableWidth * 0.48;
    const centerY = usableHeight * 0.5;

    const x = centerX + Math.cos(angle) * radiusX + ((index % 3) - 1) * 60;
    const y = centerY + Math.sin(angle) * radiusY + ((index % 4) - 1.5) * 38;

    el.style.left = Math.max(90, Math.min(x, usableWidth - 120)) + "px";
    el.style.top = Math.max(90, Math.min(y, usableHeight - 60)) + "px";

    if(index % 5 === 0){
      el.style.fontSize = "30px";
    }

    wordLayer.appendChild(el);
  });
}

placeWords();
window.addEventListener("resize", placeWords);

function getPointerPosition(event){
  const rect = canvas.getBoundingClientRect();

  if(event.touches && event.touches.length > 0){
    return {
      x:event.touches[0].clientX - rect.left,
      y:event.touches[0].clientY - rect.top
    };
  }

  return {
    x:event.clientX - rect.left,
    y:event.clientY - rect.top
  };
}

function startDrawing(event){
  event.preventDefault();

  drawing = true;

  const pos = getPointerPosition(event);
  lastX = pos.x;
  lastY = pos.y;
}

function draw(event){
  if(!drawing) return;

  event.preventDefault();

  const pos = getPointerPosition(event);

  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();

  lastX = pos.x;
  lastY = pos.y;
}

function stopDrawing(){
  drawing = false;
}

canvas.addEventListener("mousedown", startDrawing);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", stopDrawing);
canvas.addEventListener("mouseleave", stopDrawing);

canvas.addEventListener("touchstart", startDrawing);
canvas.addEventListener("touchmove", draw);
canvas.addEventListener("touchend", stopDrawing);

clearBtn.addEventListener("click", () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
});
</script>

</body>
</html>
